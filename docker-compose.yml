version: "3.9"

# ──────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

# ──────────────────────────────────────────────
# Named volumes for persistence
# ──────────────────────────────────────────────
volumes:
  mongo_data:
  csv_uploads:

# ──────────────────────────────────────────────
# Services
# ──────────────────────────────────────────────
services:
  # ── MongoDB ──────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: analytics_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: analytics
    volumes:
      - mongo_data:/data/db
      - ./python/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - backend_net
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "27017"

  # ── FastAPI backend ───────────────────────────
  backend:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: analytics_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/analytics?authSource=admin
      MONGO_DB: analytics
      JWT_SECRET: ${JWT_SECRET:-supersecretkey_change_in_prod}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: 200
      CHUNK_SIZE: 50000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - csv_uploads:/app/uploads
    networks:
      - backend_net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Next.js frontend ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: analytics_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Internal URL used by Next.js server-side calls inside Docker
      INTERNAL_API_URL: http://backend:8000
    networks:
      - frontend_net
      - backend_net
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
